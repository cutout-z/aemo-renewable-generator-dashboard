name: Monthly Curtailment Update

on:
  schedule:
    # 20th of each month — credit dashboard publishes curtailment_by_fy.csv
    # on the 18th, so we fetch the fresh rollup two days later.
    - cron: '0 0 20 * *'
  workflow_dispatch:
    inputs:
      full_refresh:
        description: 'Re-fetch all data (ignore feather caches)'
        required: false
        default: 'false'

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Curtailment Dashboard
        run: |
          ARGS=""
          if [ "${{ github.event.inputs.full_refresh }}" = "true" ]; then
            ARGS="--full-refresh"
          fi
          python -m src.main $ARGS

      - name: Validate outputs
        run: python tests/validate_outputs.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add outputs/ data/*.feather
          git diff --staged --quiet || git commit -m "Update curtailment data"
          git push
